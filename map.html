<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EV Map - Chiang Rai Tourism</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#7A2882',
            'primary-light': '#9d42a6',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="./assets/css/style.css">

  <style>
    :root {
      --map-nav-h: 5rem;
      --map-mobile-nav-h: 4rem;
    }

    .map-page-main {
      position: fixed;
      top: var(--map-nav-h);
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: 0;
      margin: 0;
    }

    @media (max-width: 767px) {
      .map-page-main {
        bottom: var(--map-mobile-nav-h);
      }
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    .floating-actions {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 40;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      pointer-events: none;
    }

    .floating-actions button {
      pointer-events: auto;
    }

    .floating-action-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 4px solid white;
    }

    .floating-action-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 46px rgba(0, 0, 0, 0.22);
    }

    .floating-action-btn.primary {
      background: radial-gradient(circle at top left, #9d42a6, #7A2882);
      color: white;
    }

    .floating-action-btn.secondary {
      background: radial-gradient(circle at top left, #2ecc71, #1d6edb);
      color: white;
    }

    @media (max-width: 768px) {
      .floating-actions {
        right: 12px;
        top: auto;
        bottom: 92px;
        transform: none;
        flex-direction: row;
      }
    }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1) !important;
      border-radius: 8px !important;
      overflow: hidden;
    }

    .leaflet-control-zoom a {
      color: #7A2882 !important;
      background: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(4px);
    }

    /* GPS Panel */
    #gpsPanel {
      position: absolute;
      bottom: 100px;
      left: 12px;
      z-index: 30;
      width: 300px;
      max-width: calc(100vw - 24px);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 1.25rem;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: translateY(0);
    }

    #gpsPanel.hidden-panel {
      transform: translateY(120%);
      opacity: 0;
      pointer-events: none;
    }

    .dark-mode #gpsPanel {
      background: rgba(22, 22, 35, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .nav-step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      animation: slideInNav 0.3s ease forwards;
    }

    .dark-mode .nav-step {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    @keyframes slideInNav {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .pulse-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1d6edb;
      border: 3px solid white;
      box-shadow: 0 0 0 0 rgba(29, 110, 219, 0.5);
      animation: pulse-ring 1.8s infinite ease-out;
    }

    @keyframes pulse-ring {
      0% {
        box-shadow: 0 0 0 0 rgba(29, 110, 219, 0.55);
      }

      70% {
        box-shadow: 0 0 0 14px rgba(29, 110, 219, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(29, 110, 219, 0);
      }
    }

    .leaflet-routing-container {
      display: none !important;
    }

    .floating-action-btn.tour {
      background: linear-gradient(135deg, #e74c3c 0%, #7A2882 100%);
      color: white;
    }

    .leaflet-ev-route-shadow {
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.35));
    }

    /* FAB Speed Dial — mobile only */
    @media (max-width: 767px) {
      .floating-actions {
        right: 14px !important;
        bottom: 80px !important;
        top: auto !important;
        transform: none !important;
        flex-direction: column !important;
        align-items: flex-end !important;
        gap: 10px !important;
      }

      .floating-actions .fab-child {
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px) scale(0.88);
        transition: opacity 0.2s ease, transform 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-direction: row-reverse;
      }

      .floating-actions.fab-open .fab-child {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0) scale(1);
      }

      .floating-actions.fab-open .fab-child:nth-child(1) {
        transition-delay: 0.08s;
      }

      .floating-actions.fab-open .fab-child:nth-child(2) {
        transition-delay: 0.05s;
      }

      .floating-actions.fab-open .fab-child:nth-child(3) {
        transition-delay: 0.02s;
      }

      .floating-actions .floating-action-btn {
        width: 48px !important;
        height: 48px !important;
        border-width: 3px !important;
      }

      .fab-label {
        background: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 999px;
        white-space: nowrap;
      }

      #fabToggleBtn {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: linear-gradient(135deg, #9d42a6, #7A2882);
        color: white;
        border: 3px solid white;
        box-shadow: 0 8px 24px rgba(122, 40, 130, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        pointer-events: auto;
        transition: transform 0.3s ease;
        flex-shrink: 0;
      }

      .floating-actions.fab-open #fabToggleBtn {
        transform: rotate(45deg);
      }
    }

    @media (min-width: 768px) {
      #fabToggleBtn {
        display: none !important;
      }

      .fab-label {
        display: none !important;
      }

      .floating-actions .fab-child {
        opacity: 1 !important;
        pointer-events: auto !important;
        transform: none !important;
        display: contents !important;
      }
    }
  </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 overflow-hidden">

  <nav class="md:hidden fixed bottom-0 w-full glass rounded-t-3xl z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
    <div class="flex justify-around items-center h-16">
      <a href="./index.html"
        class="mobile-nav-link flex flex-col items-center justify-center w-full h-full text-gray-500 transition relative">
        <i class="fas fa-home text-xl mb-1"></i>
        <span class="text-[10px] font-medium" data-i18n="nav_home">หน้าแรก</span>
      </a>
      <a href="./map.html"
        class="mobile-nav-link flex flex-col items-center justify-center w-full h-full text-gray-500 transition relative">
        <i class="fas fa-map-marked-alt text-xl mb-1"></i>
        <span class="text-[10px] font-medium" data-i18n="nav_map">แผนที่</span>

      <a href="./schedule.html"

  <main class="map-page-main">
    <div id="map"></div>

    <div id="gpsPanel" class="hidden-panel">
      <div class="flex items-center justify-between px-4 py-3"
        style="background: linear-gradient(135deg, #7A2882 0%, #1d6edb 100%);">
        <div class="flex items-center gap-2">
          <div class="pulse-dot"></div>
          <span class="text-white font-bold text-sm" id="gpsPanelTitle">นำทางไปยัง...</span>
        </div>
        <button id="closePanelBtn" class="text-white opacity-80 hover:opacity-100 transition text-lg">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700">
        <div class="flex items-center gap-3">
          <div id="destBadge"
            class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm shadow flex-shrink-0"
            style="background:#2ecc71; border:2px solid #27ae60;">1</div>
          <div class="flex-1 min-w-0">
            <p id="destName" class="font-bold text-gray-900 dark:text-white text-sm truncate">—</p>
            <p id="destDist" class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">
              <i class="fas fa-walking mr-1"></i>กำลังคำนวณ...
            </p>
          </div>
        </div>
      </div>
      <div id="navStepsContainer" class="px-4 py-2 max-h-44 overflow-y-auto text-xs text-gray-700 dark:text-gray-300">
        <p class="text-gray-400 text-center py-3 text-xs">กำลังโหลดเส้นทาง...</p>
      </div>
      <div class="flex gap-2 px-4 pb-4 pt-2">
        <button id="openGoogleMapsBtn"
          class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-white text-sm font-bold shadow transition hover:scale-[1.03]"
          style="background: linear-gradient(135deg, #1d6edb 0%, #10499d 100%);">
          <i class="fab fa-google"></i> Google Maps
        </button>
        <button id="nextStopBtn"
          class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-white text-sm font-bold shadow transition hover:scale-[1.03]"
          style="background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);">
          <i class="fas fa-forward-step"></i> สถานีถัดไป
        </button>
      </div>
    </div>

    <button id="legendToggleBtn"
      style="position:fixed;bottom:88px;left:14px;z-index:40;width:48px;height:48px;border-radius:50%;background:white;border:3px solid #7A2882;color:#7A2882;font-size:18px;box-shadow:0 4px 16px rgba(0,0,0,0.18);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,color 0.2s;"
      title="รายชื่อสถานี">
      <i class="fas fa-list-ol"></i>
    </button>

    <div id="legendPanel"
      style="position:fixed;bottom:148px;left:14px;z-index:50;width:260px;max-height:55vh;background:white;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.2);overflow:hidden;display:flex;flex-direction:column;transform:translateY(10px) scale(0.97);opacity:0;pointer-events:none;transition:opacity 0.22s ease,transform 0.22s ease;">
      <div style="background:linear-gradient(135deg,#7A2882,#9d42a6);padding:12px 16px;flex-shrink:0;">
        <p style="color:white;font-weight:700;font-size:14px;margin:0;">
          <i class="fas fa-map-pin" style="margin-right:6px;"></i><span id="legendTitle">รายชื่อสถานี EV</span>
        </p>
      </div>
      <div id="legendList" style="overflow-y:auto;flex:1;padding:6px 0;"></div>
    </div>

    <div class="floating-actions" id="floatingActions">
      <div class="fab-child">
        <span class="fab-label">เริ่มเส้นทาง EV</span>
        <button id="startTourBtn" class="floating-action-btn tour" title="เริ่มเส้นทาง EV">
          <i class="fas fa-route"></i>
        </button>
      </div>
      <div class="fab-child">
        <span class="fab-label">ตำแหน่งปัจจุบัน</span>
        <button id="currentLocationBtn" class="floating-action-btn primary" title="ตำแหน่งปัจจุบัน">
          <i class="fas fa-location-crosshairs"></i>
        </button>
      </div>
      <div class="fab-child">
        <span class="fab-label">สถานีใกล้ที่สุด</span>
        <button id="nearestStopBtn" class="floating-action-btn secondary" title="หาสถานีใกล้ที่สุด">
          <i class="fas fa-bus"></i>
        </button>
      </div>
      <button id="fabToggleBtn" aria-label="เมนู">
        <i class="fas fa-plus"></i>
      </button>
    </div>

    <script>
      // FAB toggle
      document.getElementById('fabToggleBtn')?.addEventListener('click', () => {
        document.getElementById('floatingActions').classList.toggle('fab-open');
        closeLegend();
      });

      // Legend
      const LEGEND_SPOTS = [
        { id: 1, name_th: "สถานีขนส่งเชียงรายแห่งที่ 1", name_en: "Chiang Rai Bus Terminal 1", name_cn: "清莱第一客运站" },
        { id: 2, name_th: "โรงพยาบาลเชียงรายประชานุเคราะห์", name_en: "Chiangrai Prachanukroh Hospital", name_cn: "清莱普拉查努科医院" },
        { id: 3, name_th: "วิทยาลัยเทคนิคเชียงราย", name_en: "Chiang Rai Technical College", name_cn: "清莱技术学院" },
        { id: 4, name_th: "หอนาฬิกาเฉลิมพระเกียรติฯ", name_en: "Chiang Rai Clock Tower", name_cn: "清莱钟楼" },
        { id: 5, name_th: "ตลาดสดเทศบาลนครเชียงราย", name_en: "Kad Luang Market", name_cn: "清莱市场" },
        { id: 6, name_th: "โรงเรียนสามัคคีวิทยาคม", name_en: "Samakkhi Witthayakhom School", name_cn: "萨马基维塔雅贡学校" },
        { id: 7, name_th: "สำนักงานทรัพยากรธรรมชาติและสิ่งแวดล้อมจังหวัดเชียงราย", name_en: "Provincial Office of Natural Resources", name_cn: "清莱自然资源与环境办公室" },
        { id: 8, name_th: "เทศบาลนครเชียงราย", name_en: "Chiang Rai Municipality", name_cn: "清莱市政府" },
        { id: 9, name_th: "บ้านแห่งความทรงจำ", name_en: "The House of Memory", name_cn: "记忆之家" },
        { id: 10, name_th: "ศาลากลางจังหวัดเชียงราย (หลังเก่า)", name_en: "Old Chiang Rai Provincial Hall", name_cn: "旧清莱府政厅" },
        { id: 11, name_th: "สถานีตำรวจภูธรเชียงราย", name_en: "Chiang Rai Police Station", name_cn: "清莱警察局" },
        { id: 12, name_th: "สวนตุงและโคมนครเชียงราย", name_en: "Tung and Khom Park", name_cn: "旗灯公园" },
        { id: 13, name_th: "วิทยาลัยอาชีวศึกษาเชียงราย", name_en: "Chiang Rai Vocational College", name_cn: "清莱职业学院" },
        { id: 14, name_th: "อนุสาวรีย์พ่อขุนเม็งรายมหาราช", name_en: "King Mengrai Monument", name_cn: "孟莱王纪念碑" },
        { id: 15, name_th: "วัดศรีเกิด", name_en: "Wat Sri Koed", name_cn: "斯里科德寺" },
        { id: 16, name_th: "ศูนย์การเรียนรู้เชียงราย เมืองอาหารปลอดภัย", name_en: "Chiang Rai Safe Food Learning Center", name_cn: "清莱安全食品学习中心" },
      ];
      const LEGEND_TITLES = { th: 'รายชื่อสถานี EV', en: 'EV Stop List', cn: '电动车站点列表' };
      let legendOpen = false;

      function buildLegendList() {
        const lang = (typeof currentLang !== 'undefined' ? currentLang : localStorage.getItem('appLang')) || 'th';
        const list = document.getElementById('legendList');
        const title = document.getElementById('legendTitle');
        if (title) title.textContent = LEGEND_TITLES[lang] || LEGEND_TITLES.th;
        if (!list) return;
        list.innerHTML = LEGEND_SPOTS.map(s => {
          const name = s['name_' + lang] || s.name_th;
          const bg = s.id === 1 ? '#e74c3c' : '#2ecc71';
          return `<button onclick="window.__legendGoToSpot(${s.id})" style="display:flex;align-items:center;gap:10px;width:100%;padding:8px 14px;background:none;border:none;cursor:pointer;text-align:left;border-bottom:1px solid #f3f4f6;" onmouseover="this.style.background='#f9f0ff'" onmouseout="this.style.background='none'">
            <span style="min-width:26px;height:26px;border-radius:50%;background:${bg};color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${s.id}</span>
            <span style="font-size:13px;color:#1f2937;line-height:1.3;">${name}</span>
          </button>`;
        }).join('');
      }

      window.__legendGoToSpot = function (id) {
        closeLegend();
        if (typeof allSpots !== 'undefined' && typeof markers !== 'undefined') {
          const idx = allSpots.findIndex(s => s.id === id);
          if (idx !== -1 && markers[idx]) markers[idx].fire('click');
        } else {
          window.location.href = 'map.html?spot=' + id;
        }
      };

      function openLegend() {
        buildLegendList();
        const p = document.getElementById('legendPanel');
        p.style.opacity = '1'; p.style.pointerEvents = 'auto';
        p.style.transform = 'translateY(0) scale(1)';
        legendOpen = true;
        const btn = document.getElementById('legendToggleBtn');
        btn.style.background = '#7A2882'; btn.style.color = 'white';
      }

      function closeLegend() {
        const p = document.getElementById('legendPanel');
        if (!p) return;
        p.style.opacity = '0'; p.style.pointerEvents = 'none';
        p.style.transform = 'translateY(10px) scale(0.97)';
        legendOpen = false;
        const btn = document.getElementById('legendToggleBtn');
        if (btn) { btn.style.background = 'white'; btn.style.color = '#7A2882'; }
      }

      document.getElementById('legendToggleBtn').addEventListener('click', () => {
        legendOpen ? closeLegend() : openLegend();
        document.getElementById('floatingActions')?.classList.remove('fab-open');
      });

      window.addEventListener('languageChanged', () => { if (legendOpen) buildLegendList(); });
      document.getElementById('map')?.addEventListener('click', closeLegend);
    </script>
  </main>

  <div id="spotDetailOverlay" class="spot-detail-overlay" aria-hidden="true">

    <div class="spot-detail-panel" role="dialog" aria-modal="true" style="max-width: 1000px; width: 95%;">
      <button type="button" class="spot-detail-close" id="spotDetailClose" aria-label="Close">
        <i class="fas fa-times"></i>
      </button>

      <div class="spot-detail-scroll">
        <div class="spot-detail-main">
          <header class="spot-detail-header">
            <div class="spot-detail-title-banner">
              <h2 id="spotDetailTitle">—</h2>
            </div>
          </header>

          <div class="spot-detail-body">
            <div class="spot-detail-hero">
              <div class="spot-detail-platform">

                <div class="spot-detail-platform-base" style="position: relative;">

                  <img src="./pic/mascot-guide.png" alt=""

                    draggable="false">

                  <img id="spotDetailImage" src="" alt="" class="spot-detail-spot-img hidden">
                  <video id="spotDetailVideo" class="spot-detail-spot-img hidden"
                    style="width: 100%; border-radius: inherit; object-fit: cover;" autoplay loop muted
                    playsinline></video>

                  <span id="spotDetailTag" class="spot-detail-tag">DOWNTOWN</span>

              </div>
              <div class="spot-detail-callout">
                <p id="spotDetailCallout" class="spot-detail-callout-text"></p>

            </div>
            <div class="spot-detail-desc">

            </div>

            <div class="spot-detail-ev-row">
              <span class="spot-detail-ev-label" data-i18n="ev_passing_time">เวลารถ EV ผ่าน</span>

            <button type="button" id="spotDetailNavBtn" class="spot-detail-nav-btn">

              <span data-i18n="navigate">นำทาง</span>

          </div>
        </div>
        <aside class="spot-detail-sidebar">
          <div class="spot-sidebar-box">
            <div class="spot-sidebar-section">
              <div class="spot-sidebar-btn" data-i18n="nearby">
                <i class="fas fa-map-marker-alt" style="font-size:0.65rem;"></i>

              </div>
              <div id="spotNearbyCard"></div>
            </div>

            <div class="spot-sidebar-section">
              <div class="spot-sidebar-btn" data-i18n="past_places">
                <i class="fas fa-clock-rotate-left" style="font-size:0.65rem;"></i>
                สถานที่ในอดีต
              </div>
              <div id="spotPastCard"></div>
            </div>
          </div>
        </aside>
      </div>
