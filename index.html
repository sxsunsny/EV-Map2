<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EV Map Tourism Chiang Rai</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#7A2882',
            'primary-light': '#9d42a6',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" href="./assets/css/style.css">

  <style>
    .map {
      border-radius: 30px;
    }

    .map-container-wrapper {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 2rem;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .dark .map-container-wrapper {
      background: rgba(15, 23, 42, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #static-map {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 15rem;
    }

    .glass-pill.active {
      box-shadow: 0 0 0 3px rgba(122, 40, 130, 0.35),
        0 18px 38px rgba(122, 40, 130, 0.22);
      transform: scale(1.03);
      border-color: rgba(122, 40, 130, 0.7);
      color: #7A2882;
    }
  </style>
</head>

<body class="bg-gray-50 dark:bg-gray-900 pb-24 md:pb-0 relative min-h-screen overflow-x-hidden">

  <div class="fluid-bg-container">
    <div class="fluid-blob blob-pink"></div>
    <div class="fluid-blob blob-yellow"></div>
    <div class="fluid-blob blob-blue"></div>
    <div class="fluid-blob blob-green"></div>
  </div>

  <nav class="glass fixed top-0 w-full z-50 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-20 items-center">
        <div class="flex-shrink-0 flex items-center space-x-3">
          <img src="pic/culture.jpg" alt="Culture"
            class="h-10 w-10 object-contain drop-shadow-md bg-white rounded-full p-1" title="วัฒนธรรมจังหวัดเชียงราย">
          <img src="pic/swk.PNG" alt="School" class="h-10 w-10 object-contain drop-shadow-md bg-white rounded-full p-1"
            title="โรงเรียนสามัคคีวิทยาคม">
          <img src="pic/sc.PNG" alt="Council" class="h-10 w-10 object-contain drop-shadow-md bg-white rounded-full p-1"
            title="คณะกรรมการสภานักเรียน">
        </div>

        <div class="hidden md:flex items-center space-x-8">
          <a href="./index.html" class="nav-link active text-gray-800 dark:text-gray-200 font-semibold"
            data-i18n="nav_home">หน้าแรก</a>
          <a href="./map.html" class="nav-link text-gray-800 dark:text-gray-200 font-semibold"
            data-i18n="nav_map">แผนที่</a>
          <a href="./schedule.html" class="nav-link text-gray-800 dark:text-gray-200 font-semibold"
            data-i18n="nav_schedule">ตารางรถ</a>
        </div>

        <div class="flex items-center space-x-3">
          <button
            class="dark-mode-toggle w-10 h-10 rounded-full glass flex items-center justify-center text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
            <i class="fas fa-moon"></i>
          </button>
          <div class="flex bg-gray-200 dark:bg-gray-800 rounded-full p-1 shadow-inner">
            <button
              class="lang-btn px-3 py-1 rounded-full text-sm font-medium transition text-gray-700 dark:text-gray-300"
              data-lang="th">TH</button>
            <button
              class="lang-btn px-3 py-1 rounded-full text-sm font-medium transition text-gray-700 dark:text-gray-300"
              data-lang="en">EN</button>
            <button
              class="lang-btn px-3 py-1 rounded-full text-sm font-medium transition text-gray-700 dark:text-gray-300"
              data-lang="cn">CN</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <nav
    class="md:hidden fixed bottom-0 w-full glass rounded-t-3xl z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] dark:shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
    <div class="flex justify-around items-center h-16">
      <a href="./index.html"
        class="mobile-nav-link flex flex-col items-center justify-center w-full h-full text-gray-500 transition relative">
        <i class="fas fa-home text-xl mb-1"></i>
        <span class="text-[10px] font-medium" data-i18n="nav_home">หน้าแรก</span>
      </a>
      <a href="./map.html"
        class="mobile-nav-link flex flex-col items-center justify-center w-full h-full text-gray-500 transition relative">
        <i class="fas fa-map-marked-alt text-xl mb-1"></i>
        <span class="text-[10px] font-medium" data-i18n="nav_map">แผนที่</span>
      </a>
      <a href="./schedule.html"
        class="mobile-nav-link flex flex-col items-center justify-center w-full h-full text-gray-500 transition relative">
        <i class="fas fa-bus text-xl mb-1"></i>
        <span class="text-[10px] font-medium" data-i18n="nav_schedule">ตารางรถ</span>
      </a>
    </div>
  </nav>

  <main class="pt-24 min-h-screen flex items-center justify-center px-4 relative z-10">
    <div class="max-w-7xl w-full mx-auto flex flex-col md:flex-row items-center justify-between gap-6 py-8">

      <div class="hidden md:flex flex-col gap-3 w-1/4">
        <div id="spot-btn-1" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm" data-id="1">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-4" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm" data-id="4">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-5" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm" data-id="5">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-6" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm" data-id="6">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-9" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm" data-id="9">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-10" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm"
          data-id="10">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-12" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm"
          data-id="12">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-14" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm"
          data-id="14">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
        <div id="spot-btn-16" class="glass-pill cursor-pointer min-h-[2.8rem] py-2 px-4 text-xs md:text-sm"
          data-id="16">
          <span class="spot-name-label text-center leading-tight">...</span>
        </div>
      </div>

      <div class="w-full md:w-3/4 h-[50vh] md:h-[70vh] map-container-wrapper p-2">
        <img class="map" id="static-map" src="./pic/map.PNG" alt="Chiang Rai Route Map">
      </div>

      <div class="flex md:hidden flex-col w-full gap-4 px-2 mt-4">
        <div class="flex items-center gap-3 justify-center mb-2">
          <div class="w-6 h-1 bg-primary rounded-full"></div>
          <h3 class="text-lg font-bold dark:text-white" data-i18n="route_stops">สถานีหยุดรถ</h3>
          <div class="w-6 h-1 bg-primary rounded-full"></div>
        </div>
        <div class="grid grid-cols-2 gap-3" id="mobileStopsGrid"></div>
      </div>

    </div>
  </main>

  <div id="spotModal" class="glass-modal-overlay">
    <div class="glass-modal-container relative flex flex-col md:flex-row overflow-hidden max-h-[85vh]">
      <button class="modal-close-btn" id="modalCloseBtn">
        <i class="fas fa-times"></i>
      </button>

      <div
        class="w-full md:w-1/2 h-52 md:h-auto relative shrink-0 modal-image-section bg-gray-100 flex items-center justify-center">
        <img id="modalImage" src="" class="w-full h-full object-cover hidden" alt="Spot Image">
        <video id="modalVideo" class="w-full h-full object-cover hidden" autoplay loop muted playsinline></video>

        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent pointer-events-none md:hidden"></div>
        <div id="modalMascotGuide" class="modal-mascot-guide" aria-hidden="true">
          <img src="./pic/mascot-guide.png" alt="" class="modal-mascot-img" draggable="false">
        </div>
      </div>

      <div class="w-full md:w-1/2 p-6 md:p-8 flex flex-col justify-between overflow-y-auto min-h-[300px] md:min-h-0">
        <div>
          <span class="text-xs uppercase tracking-wider font-extrabold text-primary dark:text-primary-light mb-1 block"
            data-i18n="spot_details">รายละเอียดสถานที่</span>
          <h2 id="modalTitle"
            class="text-xl md:text-3xl font-extrabold text-gray-900 dark:text-white mb-4 pr-12 md:pr-0 leading-tight">
          </h2>

          <div class="mb-4">
            <h4 class="text-sm font-bold text-gray-800 dark:text-gray-200 mb-1" data-i18n="history">ประวัติความเป็นมา
            </h4>
            <p id="modalHistory" class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed"></p>
          </div>

          <div class="mb-4">
            <h4 class="text-sm font-bold text-gray-800 dark:text-gray-200 mb-1" data-i18n="recommended_places">
              สถานที่แนะนำ</h4>
            <p id="modalDescription" class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed"></p>
          </div>

          <div class="mb-4">
            <h4 class="text-sm font-bold text-gray-800 dark:text-gray-200 mb-1" data-i18n="nearby">สถานที่ใกล้เคียง</h4>
            <p id="modalNearby" class="text-sm text-gray-600 dark:text-gray-400"></p>
          </div>

          <div class="mb-6">
            <h4 class="text-sm font-bold text-gray-800 dark:text-gray-200 mb-2" data-i18n="ev_schedule_today">
              ตารางเวลารถ EV วิ่งวันนี้</h4>
            <div id="modalTimings" class="flex flex-wrap gap-1"></div>
          </div>
        </div>

        <div class="pt-4 border-t border-gray-200/20">
          <a id="modalMapBtn" href="#"
            class="w-full btn-primary py-3 text-center text-sm font-extrabold rounded-xl shadow-md transition hover:scale-[1.03] flex items-center justify-center gap-2">
            <i class="fas fa-location-dot"></i> <span data-i18n="open_in_map">เปิดในแผนที่</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // โหลดข้อมูลสถานที่
      const spots = await loadTouristSpots();

      // ดึงเฉพาะ ID ที่ต้องการโชว์เป็นปุ่ม
      const KEEP_IDS = [1, 4, 5, 6, 9, 10, 12, 14, 16];
      const filteredSpots = spots.filter(s => KEEP_IDS.includes(s.id));

      // องค์ประกอบของ Modal
      const spotModal = document.getElementById('spotModal');
      const modalCloseBtn = document.getElementById('modalCloseBtn');
      const modalImage = document.getElementById('modalImage');
      const modalVideo = document.getElementById('modalVideo');
      const modalTitle = document.getElementById('modalTitle');
      const modalHistory = document.getElementById('modalHistory');
      const modalDescription = document.getElementById('modalDescription');
      const modalNearby = document.getElementById('modalNearby');
      const modalTimings = document.getElementById('modalTimings');
      const modalMapBtn = document.getElementById('modalMapBtn');

      // สร้างปุ่มบนมือถือแบบ Dynamic
      const mobileGrid = document.getElementById('mobileStopsGrid');
      if (mobileGrid && filteredSpots.length > 0) {
        filteredSpots.forEach(spot => {
          const mobilePill = document.createElement('div');
          mobilePill.className = 'glass-pill cursor-pointer text-xs md:text-sm p-3 text-center font-bold';
          mobilePill.setAttribute('data-id', spot.id);
          mobilePill.innerHTML = `<span class="mobile-spot-name-${spot.id}">${spot['name_' + currentLang] || spot.name_th}</span>`;
          mobileGrid.appendChild(mobilePill);
        });
      }

      // เซ็ตชื่อปุ่ม Desktop
      filteredSpots.forEach(spot => {
        const desktopBtn = document.getElementById('spot-btn-' + spot.id);
        if (desktopBtn) {
          const label = desktopBtn.querySelector('.spot-name-label');
          if (label) label.innerText = spot['name_' + currentLang] || spot.name_th;
        }
      });

      // จัดการ Event กดปุ่มแล้วเปิด Modal เลย (ไม่มีแผนที่ Leaflet แล้ว)
      document.querySelectorAll('.glass-pill').forEach(pill => {
        pill.addEventListener('click', (e) => {
          const spotId = e.currentTarget.getAttribute('data-id');
          const spot = spots.find(s => s.id == spotId);

          if (spot) {
            // สลับสถานะ active สีของปุ่ม
            document.querySelectorAll('.glass-pill.active').forEach(el => el.classList.remove('active'));
            e.currentTarget.classList.add('active');

            // เปิด Pop-up ทันที
            openDetailModal(spot);
          }
        });
      });

      // ฟังก์ชันเปิด Modal พร้อมจัดการข้อมูล/รูปภาพ/วิดีโอ
      function openDetailModal(spot) {
        // จัดการ Video / Image
        if (spot.video) {
          modalVideo.src = spot.video;
          modalVideo.classList.remove('hidden');
          modalImage.classList.add('hidden');
          modalVideo.play().catch(e => console.log('Autoplay prevented:', e));
        } else {
          modalImage.src = spot.image || 'pic/default.jpg';
          modalImage.classList.remove('hidden');
          modalVideo.classList.add('hidden');
          modalVideo.src = '';
        }

        modalTitle.innerText = spot[`name_${currentLang}`] || spot.name_th;
        modalHistory.innerText = spot[`history_${currentLang}`] || spot.history_th || spot.history || '—';
        modalDescription.innerText = spot[`description_${currentLang}`] || spot.description_th || spot.description || '—';
        modalNearby.innerText = spot.nearby_landmarks ? spot.nearby_landmarks.join(', ') : '—';

        modalTimings.innerHTML = '';
        if (spot.ev_time && spot.ev_time.length > 0) {
          spot.ev_time.forEach(time => {
            const badge = document.createElement('span');
            badge.className = 'time-badge bg-purple-100 text-primary px-2 py-1 rounded text-xs font-semibold';
            badge.innerHTML = `<i class="far fa-clock mr-1"></i> ${time}`;
            modalTimings.appendChild(badge);
          });
        } else {
          modalTimings.innerHTML = '<span class="text-xs text-gray-400">—</span>';
        }

        modalMapBtn.href = `./map.html?spot=${spot.id}`;
        spotModal.classList.add('active');
      }

      function stopModalMedia() {
        if (modalVideo) {
          modalVideo.pause();
          modalVideo.src = '';
        }
      }

      // ปิด Modal
      modalCloseBtn.addEventListener('click', () => {
        spotModal.classList.remove('active');
        stopModalMedia();
      });
      spotModal.addEventListener('click', (e) => {
        if (e.target === spotModal) {
          spotModal.classList.remove('active');
          stopModalMedia();
        }
      });

      // เปลี่ยนภาษา
      window.addEventListener('languageChanged', () => {
        filteredSpots.forEach(spot => {
          const desktopBtn = document.getElementById('spot-btn-' + spot.id);
          if (desktopBtn) {
            const label = desktopBtn.querySelector('.spot-name-label');
            if (label) label.innerText = spot['name_' + currentLang] || spot.name_th;
          }
          const mobileLabel = document.querySelector('.mobile-spot-name-' + spot.id);
          if (mobileLabel) mobileLabel.innerText = spot['name_' + currentLang] || spot.name_th;
        });

        if (spotModal.classList.contains('active')) {
          const activeTitle = modalTitle.innerText;
          const currentSpot = spots.find(s => s.name_th === activeTitle || s.name_en === activeTitle || s.name_cn === activeTitle);
          if (currentSpot) {
            openDetailModal(currentSpot);
          }
        }
      });
    });
  </script>
</body>

</html>
